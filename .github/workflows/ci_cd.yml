name: EchoChain CI/CD Data Pipeline & Quality Suite

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Java 17 (PySpark Requirement)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Pip Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Black & Isort
        run: |
          black --check .
          isort --check-only .

      - name: Generate Datasets
        run: |
          python datasets/generate_datasets.py

      - name: Run PySpark Medallion Lakehouse Pipeline
        run: |
          python pyspark_pipeline/run_pipeline.py

      - name: Run Pytest & Data Quality Suite
        run: |
          pytest tests/ -v --durations=10

      - name: Build Docker Image
        run: |
          docker build -f docker/Dockerfile -t echochain:latest .
